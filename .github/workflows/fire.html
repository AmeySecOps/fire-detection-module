<!DOCTYPE html>
<html>
<head>

<title>Fire Detection Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
margin:0;
background:#0f172a;
font-family:Arial;
overflow:hidden;
color:white;
text-align:center;
}

.container{
padding-top:30px;
}

.card{
width:350px;
margin:auto;
padding:20px;
border-radius:20px;
background:#1e293b;
box-shadow:0 0 30px rgba(255,255,255,0.2);
}

.fire{

font-size:120px;
animation:fireMove 1s infinite alternate;
}

@keyframes fireMove{

from{
transform:translateY(0px);
}

to{
transform:translateY(-15px);
}
}

.safe{

color:lightgreen;
}

.danger{

color:red;
animation:blink .5s infinite;
}

@keyframes blink{

50%{
opacity:.4;
}

100%{
opacity:1;
}
}

.circle{

height:220px;
width:220px;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
border:10px solid orange;
box-shadow:0 0 60px orange;
}

</style>

</head>

<body>

<div class="container">

<h1>Smart Fire Detection System</h1>

<div class="card">

<div class="circle">

<div class="fire">
🔥
</div>

</div>

<h2 id="status">
Loading...
</h2>

<h3 id="sensor">
Sensor Value:0
</h3>

</div>

</div>

<script>

const firebaseConfig={

apiKey:"AIzaSyDzx3ZjmHMFvrM8iWH7VDjl8FTgwSH1dFg",

databaseURL:"https://fire--detection-module-default-rtdb.asia-southeast1.firebasedatabase.app"

};

firebase.initializeApp(firebaseConfig);

let ref=
firebase.database().ref("fire");

ref.on("value",(snapshot)=>{

let data=snapshot.val();

document.getElementById("sensor")
.innerHTML=
"Sensor Value:"+data.sensorValue;

document.getElementById("status")
.innerHTML=
data.status;

if(data.status=="FIRE DETECTED")
{
document.getElementById("status")
.className="danger";
}
else
{
document.getElementById("status")
.className="safe";
}

});

</script>

</body>
</html>
